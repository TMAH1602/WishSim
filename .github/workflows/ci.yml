name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run tests
        run: cargo test --locked
      - name: Run Clippy
        run: cargo clippy --all-targets --locked -- -D warnings
