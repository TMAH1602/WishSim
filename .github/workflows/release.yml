name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes --title "WishSim ${GITHUB_REF_NAME}"

  build-unix:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            artifact: wishsim-linux-x86_64
          - runner: macos-15
            artifact: wishsim-macos-arm64
          - runner: macos-15-intel
            artifact: wishsim-macos-x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - name: Build release binary
        run: cargo build --release --locked
      - name: Package
        run: tar -czf "${{ matrix.artifact }}.tar.gz" -C target/release wishsim -C ../.. README.md LICENSE CHANGELOG.md
      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" "${{ matrix.artifact }}.tar.gz" --clobber

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build release binary
        run: cargo build --release --locked
      - name: Package
        shell: pwsh
        run: Compress-Archive -Path target/release/wishsim.exe,README.md,LICENSE,CHANGELOG.md -DestinationPath wishsim-windows-x86_64.zip
      - name: Upload release asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$env:GITHUB_REF_NAME" wishsim-windows-x86_64.zip --clobber
